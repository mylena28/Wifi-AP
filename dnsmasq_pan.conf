# dnsmasq config for Bluetooth PAN (pan0 interface)
# Copied to /etc/dnsmasq.d/bluetooth-pan.conf by setup_pi.sh

interface=pan0
dhcp-range=192.168.50.2,192.168.50.20,255.255.255.0,24h
dhcp-option=3,192.168.50.1
# respond immediately without waiting for a decline cycle
dhcp-authoritative
# always reply as broadcast — required for Android BT PAN clients
dhcp-broadcast
# IPv6: send Router Advertisements advertising fd00::/64 via SLAAC.
# Android BT PAN sends only Router Solicitations (not DHCPv4) and waits for
# this RA before configuring any address — without it the phone never gets an IP.
dhcp-range=::1,::ffff,constructor:pan0,ra-only,64,24h
# Redirect Android network validation probes to Flask.
# Android BT PAN keeps dropping the connection every ~20s when it can't reach
# google's connectivity check endpoint. Pointing these domains to fd00::1
# lets Flask return HTTP 204, which Android accepts as "internet connected".
address=/connectivitycheck.gstatic.com/fd00::1
address=/connectivitycheck.android.com/fd00::1
address=/clients3.google.com/fd00::1
address=/play.googleapis.com/fd00::1
