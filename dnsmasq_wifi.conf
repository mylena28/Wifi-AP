# dnsmasq config for Wi-Fi AP (wlan0 interface)
# Copied to /etc/dnsmasq.d/wifi-ap.conf by setup_pi.sh

interface=wlan0
dhcp-range=192.168.50.2,192.168.50.20,255.255.255.0,24h
dhcp-option=3,192.168.50.1
dhcp-authoritative

# Redirect Android connectivity check probes to Flask.
# Port 80 → 8080 is handled by iptables in wifi-ap.service.
# Android accepts HTTP 204 as "internet connected" and stops showing the
# "no internet" warning that would otherwise prevent the browser from opening.
address=/connectivitycheck.gstatic.com/192.168.50.1
address=/connectivitycheck.android.com/192.168.50.1
address=/clients3.google.com/192.168.50.1
address=/play.googleapis.com/192.168.50.1
