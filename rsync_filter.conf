# Filtro de sincronização do sync_backup.sh (rsync --filter="merge ...").
# Dentro de cada pasta de projeto em Monitoramento/, só a subpasta "logs/"
# é enviada para o Pi backup — código-fonte (*.py) e histórico git (.git/)
# nunca saem do Pi principal. Regras avaliadas em ordem, a primeira que
# bater decide (+ inclui, - exclui).

- .git/
- *.py
+ */
+ */logs/
+ */logs/**
- *
