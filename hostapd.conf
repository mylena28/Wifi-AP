# Wi-Fi Access Point — Raspberry Pi Gallery
# Copied to /etc/hostapd/hostapd.conf by setup_pi.sh

interface=wlan0
driver=nl80211

# Altere SSID e senha conforme necessário
ssid=PiGaleria
wpa_passphrase=piimagens

# 2.4 GHz, canal 6 (maior compatibilidade)
country_code=BR
hw_mode=g
channel=6
wmm_enabled=0

# WPA2
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
