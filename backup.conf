# Configuração do Pi de backup
# Preencha após definir o IP fixo do Pi backup.

# IP ou hostname do Pi backup
BACKUP_HOST=

# Porta SSH no Pi backup (padrão: 22)
BACKUP_PORT=22

# Usuário SSH no Pi backup
BACKUP_USER=pi

# Pasta destino no Pi backup (criada automaticamente se não existir)
BACKUP_PATH=/home/pi/backup

# Intervalo entre sincronizações enquanto conectado à internet (segundos)
# 3600 = 1 hora
BACKUP_INTERVAL=3600

# Tentativas de retry do rsync em caso de falha, e intervalo entre elas
# (segundos), antes de desistir até o próximo BACKUP_INTERVAL. Descomente
# para sobrescrever os padrões (3 tentativas, 90s).
# SYNC_MAX_RETRIES=3
# SYNC_RETRY_DELAY=90

# Tempos do wifi_manager.sh (segundos). Descomente para sobrescrever os
# padrões do script: timeout do modo AP sem clientes, intervalo de checagem
# de clientes no AP, e intervalo de checagem da conexão Wi-Fi em modo cliente.
# AP_TIMEOUT=900
# CHECK_AP_INTERVAL=30
# CHECK_WIFI_INTERVAL=60
